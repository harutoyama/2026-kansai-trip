name: Pull Request CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'chatgpt/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          npm test 2>&1 | tee ci-logs/test.log

      - name: Lint
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          npm run lint 2>&1 | tee ci-logs/lint.log

      - name: Build
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          npm run build 2>&1 | tee ci-logs/build.log

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser integration test
        shell: bash
        run: |
          mkdir -p ci-logs
          set -o pipefail
          npm run test:e2e 2>&1 | tee ci-logs/e2e.log

      - name: Upload verification diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics
          path: |
            ci-logs
            playwright-report
            test-results
          if-no-files-found: ignore
