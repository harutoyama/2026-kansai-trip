name: Apply planning test foundation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply source changes
        run: node scripts/apply-planning-test-foundation.mjs

      - name: Refresh package lock
        run: npm install --package-lock-only

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- .github/workflows/ci.yml
          git add -A
          git commit -m "feat: enable editable plans and browser regressions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
